name: Manage Jobs

on:
  repository_dispatch:
    types: [add-job]

jobs:
  add-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Update jobs.json
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          # Get current jobs
          content=$(curl -s -H "Authorization: token $REPO_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/src/data/jobs.json")
          
          # Decode and update content
          current_jobs=$(echo $content | jq -r '.content' | base64 --decode)
          updated_content=$(echo $current_jobs | jq '.jobs += [${{ toJSON(github.event.client_payload.job) }}]')
          
          # Encode and update file
          encoded_content=$(echo "$updated_content" | base64)
          sha=$(echo $content | jq -r '.sha')
          
          curl -X PUT -H "Authorization: token $REPO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/src/data/jobs.json" \
            -d "{\"message\":\"Add new job\",\"content\":\"$encoded_content\",\"sha\":\"$sha\"}" 